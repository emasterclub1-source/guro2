<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 영어 단어장</title>
<style>
:root{
  --p:#4f46e5;--pd:#3730a3;--teal:#0891b2;--ok:#10b981;--err:#ef4444;
  --bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --r:12px;--shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* TOP NAV */
.topbar{background:linear-gradient(135deg,var(--p),var(--teal));color:#fff;
  padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.topbar h1{font-size:18px;font-weight:800;letter-spacing:-.5px;margin-right:auto}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 14px;
  border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.nav-btn:hover{background:rgba(255,255,255,.28)}
.nav-btn.active{background:#fff;color:var(--p)}

/* MAIN */
main{max-width:920px;margin:0 auto;padding:18px 16px 80px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}

/* FILTERS */
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;margin-bottom:16px}
.filter-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.filter-group select,.filter-group input{width:100%;padding:8px 10px;border:1px solid var(--border);
  border-radius:8px;font-size:13px;outline:none;background:#fff;color:var(--text)}
.filter-group select:focus,.filter-group input:focus{border-color:var(--p)}

/* QUESTION CHIPS */
.q-filter{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.q-chip{padding:6px 11px;border:1.5px solid var(--border);border-radius:14px;
  background:#fff;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;
  transition:.15s;user-select:none;display:inline-flex;align-items:center;gap:4px}
.q-chip:hover{border-color:var(--p);background:#eef2ff}
.q-chip.sel{background:var(--p);color:#fff;border-color:var(--p)}
.q-chip .qcnt{font-size:10px;opacity:.7;font-weight:600}
.q-chip.sel .qcnt{opacity:.85}
.q-chip.tb{border-color:#86efac;color:#166534;background:#f0fdf4}
.q-chip.tb:hover{background:#dcfce7;border-color:#4ade80}
.q-chip.tb.sel{background:#16a34a;color:#fff;border-color:#16a34a}
.q-actions{display:flex;gap:4px;margin-top:6px}
.q-actions button{padding:3px 8px;font-size:10px;border:1px solid var(--border);
  border-radius:6px;background:transparent;color:var(--muted);cursor:pointer}
.q-actions button:hover{background:var(--bg);color:var(--text)}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;text-align:center}
.stat-n{font-size:24px;font-weight:800;color:var(--p)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 18px;
  border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;
  transition:.15s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-o:hover{background:var(--bg)}
.btn-ok{background:var(--ok);color:#fff}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* WORD LIST */
.word-list{display:grid;gap:10px}
.witem{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;
  transition:.15s}
.witem:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.witem-main{flex:1;min-width:0}
.witem-word{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.witem-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:4px;flex-wrap:wrap}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;
  border-radius:4px}
.b-grade{background:#dbeafe;color:#1e40af}
.b-year{background:#fef3c7;color:#92400e}
.b-month{background:#fce7f3;color:#9f1239}
.b-exam{background:#ede9fe;color:#5b21b6}
.b-q{background:#cffafe;color:#155e75}
.b-exam.tb{background:#dcfce7;color:#166534;border:1px solid #86efac}
.b-q.tb{background:#bbf7d0;color:#14532d;border:1px solid #4ade80}
.witem-syn,.witem-ant{font-size:12px;margin-top:5px;line-height:1.6}
.witem-syn .tag{background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:11px;font-size:11px;margin-right:3px;display:inline-block;margin-bottom:3px}
.witem-ant .tag{background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:11px;font-size:11px;margin-right:3px;display:inline-block;margin-bottom:3px}
.witem-kor{font-size:12px;color:#1e40af;margin-top:5px;font-weight:600}
.witem-eng{font-size:11px;color:#78350f;margin-top:4px;font-style:italic;background:#fef3c7;padding:4px 8px;border-radius:4px}
.witem-korctx{font-size:11px;color:#5b21b6;margin-top:4px}

/* FLASHCARD */
.fc-wrap{perspective:1000px;height:340px;margin:18px 0;cursor:pointer;user-select:none}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.fc.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;
  border-radius:14px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px}
.fc-front{background:linear-gradient(135deg,var(--p),var(--teal));color:#fff}
.fc-front .fc-word{font-size:36px;font-weight:800;text-align:center;letter-spacing:-1px}
.fc-front .fc-hint{font-size:13px;opacity:.75;margin-top:14px}
.fc-back{background:var(--card);border:2px solid var(--border);
  transform:rotateY(180deg);overflow-y:auto;align-items:flex-start!important}
.fc-back .fc-word{font-size:24px;font-weight:800;margin-bottom:14px}
.fc-back h4{font-size:10px;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;margin-bottom:6px}
.fc-sec{margin-bottom:12px;width:100%}
.fc-sec.syn h4{color:#059669}.fc-sec.ant h4{color:#dc2626}
.fc-tags{display:flex;flex-wrap:wrap;gap:5px}
.fc-tag{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500}
.fc-tag.syn{background:#d1fae5;color:#065f46}
.fc-tag.ant{background:#fee2e2;color:#991b1b}
.fc-kor{font-size:16px;color:#1e40af;margin-bottom:8px;width:100%;font-weight:600}
.fc-eng{font-size:13px;color:#78350f;background:#fef3c7;padding:8px 12px;border-radius:6px;
  font-style:italic;width:100%;margin-bottom:8px;line-height:1.5}
.fc-korctx{font-size:13px;color:#5b21b6;width:100%}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
.fc-cnt{font-size:14px;color:var(--muted);min-width:80px;text-align:center;font-weight:600}
.fc-prog{height:4px;background:var(--border);border-radius:2px;width:100%;margin-top:14px}
.fc-prog-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--teal));border-radius:2px;transition:.3s}

/* QUIZ */
.qpbar{height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden}
.qpbar-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--teal));transition:.3s}
.qtype{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.qtype.syn{color:#059669}.qtype.ant{color:#dc2626}.qtype.eng{color:#92400e}.qtype.kor{color:#1e40af}
.qword{font-size:32px;font-weight:800;margin-bottom:8px;letter-spacing:-.8px}
.qprompt{font-size:14px;color:var(--muted);margin-bottom:18px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{padding:14px 18px;border:2px solid var(--border);border-radius:10px;
  background:var(--card);font-size:14px;cursor:pointer;transition:.15s;
  text-align:left;font-weight:500}
.choice:hover:not(:disabled){border-color:var(--p);background:#eef2ff}
.choice.correct{border-color:var(--ok)!important;background:#d1fae5!important;color:#065f46!important}
.choice.wrong{border-color:var(--err)!important;background:#fee2e2!important;color:#991b1b!important}
.choice:disabled{cursor:default}
.choice.sel{border-color:var(--p);background:#eef2ff}
.qwrite-input{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:10px;
  font-size:18px;outline:none;margin-bottom:12px;text-align:center}
.qwrite-input:focus{border-color:var(--p)}
.qwrite-input.correct{border-color:var(--ok);background:#d1fae5}
.qwrite-input.wrong{border-color:var(--err);background:#fee2e2}

/* RESULT */
.result{text-align:center;padding:30px 20px}
.result-pct{font-size:64px;font-weight:900;background:linear-gradient(135deg,var(--p),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.result-sub{font-size:14px;color:var(--muted);margin-top:4px}
.result-msg{font-size:18px;font-weight:700;margin:14px 0}
.ritem{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;margin-bottom:8px;font-size:13px;text-align:left}
.ritem-w{font-weight:700;font-size:15px;margin-bottom:4px}
.ritem-c{font-size:12px;color:var(--err)}.ritem-r{color:var(--ok)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:14px}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:14px}

/* FORM */
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fi,.fta{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;outline:none;background:#fff;color:var(--text);font-family:inherit}
.fi:focus,.fta:focus{border-color:var(--p)}
.fta{min-height:140px;resize:vertical;line-height:1.6;font-family:'Consolas',monospace;font-size:12px}
.fg-row{display:flex;gap:8px}.fg-row>.fg{flex:1}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:10px;opacity:.5}

/* UTILS */
.hidden{display:none!important}
.tip{font-size:12px;color:var(--muted);background:#f8fafc;border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;margin-bottom:14px;line-height:1.5}
[contenteditable]{outline:none}

/* RESPONSIVE */
@media(max-width:600px){
  .topbar h1{font-size:16px}
  .nav-btn{padding:6px 10px;font-size:12px}
  .choices,.et-choices{grid-template-columns:1fr}
  .fc-wrap{height:380px}
  .fc-front .fc-word{font-size:28px}
  .qword{font-size:24px}
}
</style>
</head>
<body>

<header class="topbar">
  <h1>📚 영어 단어장</h1>
  <button class="nav-btn active" data-view="home">🏠 홈</button>
  <button class="nav-btn" data-view="flashcard">🃏 플래시카드</button>
  <button class="nav-btn" data-view="quiz-mcq">✏️ 객관식 퀴즈</button>
  <button class="nav-btn" data-view="quiz-write">⌨️ 주관식 퀴즈</button>
  <button class="nav-btn" data-view="exam">📝 모의시험</button>
  <button class="nav-btn" data-view="wrong">❌ 오답 <span id="wrong-badge" class="hidden" style="background:#ef4444;color:#fff;padding:1px 6px;border-radius:10px;font-size:10px;margin-left:3px">0</span></button>
  <button class="nav-btn" data-view="teacher" id="teacher-btn" hidden>🔧 선생님</button>
</header>

<main id="main">
  <div id="view-home" class="view">
    <div class="stat-row">
      <div class="stat"><div class="stat-n" id="stat-words">0</div><div class="stat-l">전체 단어</div></div>
      <div class="stat"><div class="stat-n" id="stat-filtered">0</div><div class="stat-l">필터 결과</div></div>
      <div class="stat"><div class="stat-n" id="stat-wrong">0</div><div class="stat-l">오답</div></div>
    </div>
    <div class="card">
      <div class="filters" id="filter-bar"></div>
      <div class="btn-row">
        <button class="btn btn-o" id="clear-filter">🔄 필터 초기화</button>
      </div>
    </div>
    <div id="word-list-container"></div>
  </div>

  <div id="view-flashcard" class="view hidden">
    <div class="card">
      <div class="tip">💡 카드를 클릭(또는 스페이스)하면 뒤집혀요. ← → 키로 이동</div>
      <div id="fc-area"></div>
    </div>
  </div>

  <div id="view-quiz-mcq" class="view hidden">
    <div id="quiz-mcq-area"></div>
  </div>

  <div id="view-quiz-write" class="view hidden">
    <div id="quiz-write-area"></div>
  </div>

  <div id="view-exam" class="view hidden">
    <div id="exam-area"></div>
  </div>

  <div id="view-wrong" class="view hidden">
    <div id="wrong-area"></div>
  </div>

  <div id="view-teacher" class="view hidden">
    <div id="teacher-area"></div>
  </div>
</main>

<script>
/* ═══════════════ DATA ═══════════════ */
const META_DEFAULT = {grade:'고2',year:2026,month:3,exam:'학력평가',questionNo:0};

const WORDS_RAW = [
{"qn":18,"w":[{"word":"appreciate","syn":["thank","be grateful for","value"],"ant":["resent","disregard"],"kor":"고마워하다","eng":"to be grateful for something someone has done or to recognize the worth of something","kor_ctx":"누군가가 한 일에 감사하게 여기거나 어떤 것의 가치를 인정하는 것"},{"word":"continued","syn":["ongoing","sustained","persistent","uninterrupted"],"ant":["stopped","ceased","interrupted"],"kor":"지속적인","eng":"continuing without interruption or break over a period of time","kor_ctx":"일정한 기간 동안 중단 없이 계속되는"},{"word":"previously","syn":["formerly","earlier","before","in the past"],"ant":["currently","now","presently"],"kor":"이전에, 미리","eng":"at a time before the present moment; earlier","kor_ctx":"지금 이전의 시점에; 앞서"},{"word":"announce","syn":["declare","proclaim","publicize","state"],"ant":["conceal","hide","suppress"],"kor":"공고하다, 알리다","eng":"to make something known publicly or officially to many people","kor_ctx":"많은 사람들에게 공식적으로 또는 공공연히 알리는 것"},{"word":"conduct","syn":["carry out","perform","execute","manage"],"ant":["neglect","abandon","halt"],"kor":"시행하다, 수행하다","eng":"to carry out, organize, or perform a particular activity or process","kor_ctx":"특정한 활동이나 과정을 수행하거나 조직하는 것"},{"word":"essential","syn":["necessary","vital","crucial","indispensable"],"ant":["unnecessary","optional","dispensable"],"kor":"필수적인","eng":"absolutely necessary or extremely important and cannot be done without","kor_ctx":"반드시 필요하거나 극도로 중요해서 그것 없이 할 수 없는"},{"word":"maintenance","syn":["upkeep","preservation","repair","servicing"],"ant":["neglect","deterioration"],"kor":"보수(공사), 정비","eng":"the process of keeping something in good condition by regularly checking and repairing it","kor_ctx":"정기적으로 점검하고 수리하여 무언가를 좋은 상태로 유지하는 과정"},{"word":"underground","syn":["subterranean","below-ground","below the surface"],"ant":["aboveground","overground","surface"],"kor":"지하의","eng":"located, occurring, or used beneath the surface of the ground","kor_ctx":"지면 아래에 위치하거나 발생하거나 사용되는"},{"word":"parking lot","syn":["parking area", MOCK_RAW.forEach(q => {
  q.w.forEach(w => {
    if (!w.word) return;
    WORDS.push({
      id: 'mk_' + (WORDS.length + 1).toString().padStart(4, '0'),
      word: w.word,
      syn: w.syn || [],
      ant: w.ant || [],
      kor: w.kor || '',
      eng: w.eng || '',
      kor_ctx: w.kor_ctx || '',
      grade: '고2',
      year: q.y,
      month: q.m,
      exam: q.exam,
      questionNo: q.qn
    });
  });
});

/* ═══════════════ STATE ═══════════════ */
let currentView = 'home';
const filters = {grade:'',year:'',month:'',exam:'',publisher:'',questionNos:[]};
let wrongWords = JSON.parse(localStorage.getItem('wrong_words') || '{}');

const teacherMode = new URLSearchParams(location.search).get('teacher') === '1';

/* ═══════════════ UTILS ═══════════════ */
const shuffle = a => { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]} return b; };
const esc = s => { const d=document.createElement('div');d.textContent=s;return d.innerHTML; };
// 단어 라벨 포매팅 (교과서는 단원 "4과", 시험은 "Q18")
const fmtQ = w => w.exam === '교과서' ? `${w.questionNo}과` : `Q${w.questionNo}`;
// 출처 라벨 (교과서: 📚 출판사 단원, 학력평가: 📝 년/월 시험)
const srcBadge = w => {
  const isTextbook = w.exam === '교과서';
  const cls = isTextbook ? 'b-exam tb' : 'b-exam';
  let text;
  if (isTextbook) {
    const pub = w.publisher ? esc(w.publisher) : '';
    text = `📚 ${pub} ${w.questionNo}과`.trim();
  } else {
    text = `📝 ${w.year}년 ${w.month}월 ${esc(w.exam)}`;
  }
  return {cls, text, isTextbook};
};
const setView = (name) => {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.getElementById('view-' + name).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-view="${name}"]`).classList.add('active');
  if (name === 'home') renderHome();
  else if (name === 'flashcard') renderFlashcard();
  else if (name === 'quiz-mcq') renderQuizSetup('mcq');
  else if (name === 'quiz-write') renderQuizSetup('write');
  else if (name === 'exam') renderExam();
  else if (name === 'wrong') renderWrong();
  else if (name === 'teacher') renderTeacher();
  window.scrollTo(0,0);
};

/* ═══════════════ FILTERING ═══════════════ */
const getFiltered = () => WORDS.filter(w => {
  if (filters.grade && w.grade !== filters.grade) return false;
  if (filters.year && String(w.year) !== String(filters.year)) return false;
  if (filters.month && String(w.month) !== String(filters.month)) return false;
  if (filters.exam && w.exam !== filters.exam) return false;
  if (filters.publisher && w.publisher !== filters.publisher) return false;
  if (filters.questionNos.length && !filters.questionNos.includes(String(w.questionNo))) return false;
  return true;
});

const uniqueValues = key => [...new Set(WORDS.map(w => w[key]))].filter(Boolean).sort();

/* ═══════════════ RENDER HOME ═══════════════ */
function renderHome() {
  const filtered = getFiltered();
  document.getElementById('stat-words').textContent = WORDS.length;
  document.getElementById('stat-filtered').textContent = filtered.length;
  document.getElementById('stat-wrong').textContent = Object.keys(wrongWords).length;
  
  // Filter bar
  const fb = document.getElementById('filter-bar');
  // 출판사 목록 (교과서 단어 중 실제로 있는 것만 동적)
  const publishers = [...new Set(WORDS.filter(w => w.exam === '교과서').map(w => w.publisher).filter(Boolean))];
  
  fb.innerHTML = `
    <div class="filter-group"><label>학년</label><select id="f-grade"><option value="">전체</option>${uniqueValues('grade').map(v=>`<option ${filters.grade===v?'selected':''}>${v}</option>`).join('')}</select></div>
    <div class="filter-group"><label>시험 (구분)</label><select id="f-exam"><option value="">전체</option>${uniqueValues('exam').map(v=>`<option ${filters.exam===v?'selected':''}>${v}</option>`).join('')}</select></div>
    <div class="filter-group" id="f-pub-wrap" style="${filters.exam==='교과서'?'':'display:none'}"><label>교재 (출판사)</label><select id="f-pub"><option value="">전체</option>${publishers.map(p=>`<option ${filters.publisher===p?'selected':''}>${p}</option>`).join('')}</select></div>
    <div class="filter-group"><label>연도</label><select id="f-year"><option value="">전체</option>${uniqueValues('year').map(v=>`<option ${filters.year===String(v)?'selected':''}>${v}</option>`).join('')}</select></div>
    <div class="filter-group"><label>월</label><select id="f-month"><option value="">전체</option>${uniqueValues('month').map(v=>`<option ${filters.month===String(v)?'selected':''}>${v}월</option>`).join('')}</select></div>
    <div class="filter-group" style="grid-column:1/-1"><label>문제 번호 <span style="color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0">(${filters.questionNos.length}개 선택됨 · 클릭해서 여러 개 골라보세요)</span></label>
      <div class="q-filter" id="q-chips"></div>
      <div class="q-actions">
        <button onclick="qChipsSelect('all')">✓ 전체 선택</button>
        <button onclick="qChipsSelect('none')">✗ 전체 해제</button>
        <button onclick="qChipsSelect('first')">앞 5개</button>
      </div>
    </div>
  `;
  ['grade','year','month','exam','pub'].forEach(k => {
    document.getElementById('f-'+k).onchange = e => {
      if (k === 'exam') {
        filters.exam = e.target.value;
        // 교과서가 아니면 출판사 리셋, 교과서로 바꾸면 연도/월 리셋
        if (filters.exam !== '교과서') filters.publisher = '';
        if (filters.exam === '교과서') { filters.year = ''; filters.month = ''; }
      } else if (k === 'pub') {
        filters.publisher = e.target.value;
      } else {
        filters[k] = e.target.value;
      }
      filters.questionNos = []; // 다른 필터 바꾸면 번호 선택 초기화
      renderHome();
    };
  });

  // 교과서일 때 연도/월 자동 숨김 (출판사는 따로 처리됨)
  const ymWrap = document.getElementById('f-year')?.parentElement;
  const yLabel = document.getElementById('f-month')?.parentElement;
  if (filters.exam === '교과서') {
    if (ymWrap) ymWrap.style.display = 'none';
    if (yLabel) yLabel.style.display = 'none';
  } else {
    if (ymWrap) ymWrap.style.display = '';
    if (yLabel) yLabel.style.display = '';
  }
  
  // Generate question chips based on other filters
  const qTmp = {...filters, questionNos:[]};
  const avail = WORDS.filter(w => {
    if (qTmp.grade && w.grade !== qTmp.grade) return false;
    if (qTmp.year && String(w.year) !== String(qTmp.year)) return false;
    if (qTmp.month && String(w.month) !== String(qTmp.month)) return false;
    if (qTmp.exam && w.exam !== qTmp.exam) return false;
    return true;
  });
  const counts = {};
  const labelByQ = {}; // q → "4과" or "Q18"
  const tbByQ = {}; // q → true if textbook
  avail.forEach(w => {
    const k = String(w.questionNo);
    counts[k] = (counts[k]||0)+1;
    if (!labelByQ[k]) {
      labelByQ[k] = w.exam === '교과서' ? `${w.questionNo}과` : `Q${w.questionNo}`;
      tbByQ[k] = w.exam === '교과서';
    }
  });
  const qList = [...new Set(avail.map(w => String(w.questionNo)))].sort((a,b) => parseInt(a)-parseInt(b));
  // Remove selections that are no longer available
  filters.questionNos = filters.questionNos.filter(q => qList.includes(q));
  
  document.getElementById('q-chips').innerHTML = qList.length
    ? qList.map(q => `<span class="q-chip ${filters.questionNos.includes(q)?'sel':''}${tbByQ[q]?' tb':''}" onclick="toggleQ('${q}')">${labelByQ[q]} <span class="qcnt">${counts[q]||0}</span></span>`).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:8px 4px">😅 선택 가능한 문제가 없어요. 다른 필터를 조정해보세요.</div>';
  
  document.getElementById('clear-filter').onclick = () => {
    Object.keys(filters).forEach(k => {
      filters[k] = Array.isArray(filters[k]) ? [] : '';
    });
    renderHome();
  };
  
  renderWordList();
}

function toggleQ(q) {
  const i = filters.questionNos.indexOf(q);
  if (i >= 0) filters.questionNos.splice(i, 1);
  else filters.questionNos.push(q);
  renderHome();
}

function qChipsSelect(mode) {
  const qTmp = {...filters, questionNos:[]};
  const avail = WORDS.filter(w => {
    if (qTmp.grade && w.grade !== qTmp.grade) return false;
    if (qTmp.year && String(w.year) !== String(qTmp.year)) return false;
    if (qTmp.month && String(w.month) !== String(qTmp.month)) return false;
    if (qTmp.exam && w.exam !== qTmp.exam) return false;
    return true;
  });
  const qList = [...new Set(avail.map(w => String(w.questionNo)))].sort((a,b)=>parseInt(a)-parseInt(b));
  if (mode === 'all') filters.questionNos = qList;
  else if (mode === 'none') filters.questionNos = [];
  else if (mode === 'first') filters.questionNos = qList.slice(0, 5);
  renderHome();
}

function toggleWrong(id) {

  const areaId = mode === 'mcq' ? 'quiz-mcq-area' : 'quiz-write-area';

    <div class="card">
      <div class="tip">💡 현재 필터 조건에 맞는 단어들로 퀴즈를 풀어요. 필터는 홈에서 조정하세요.</div>
      <div class="fg"><label class="fl">문제 수</label>
        <select id="q-count" class="fi">
          <option value="5">5문제</option>
          <option value="10" selected>10문제</option>
          <option value="20">20문제</option>
          <option value="0">전체</option>
        </select>
      </div>
      <div class="fg"><label class="fl">유형</label>
        <select id="q-type" class="fi">
          <option value="both">유의어 + 반의어 섞기</option>
          <option value="syn">유의어만</option>

        <div style="padding:10px;background:var(--bg);border-radius:8px;font-weight:700;color:var(--p)" id="q-pool-cnt">${filtered.length}개 가능</div>
      </div>
      <button class="btn btn-p btn-row" style="width:100%;justify-content:center" onclick="startQuiz('${mode}')">시작하기 →</button>
    </div>
  `;
}

let qState = null;
function startQuiz(mode) {
  const filtered = getFiltered().filter(w => w.syn.length + w.ant.length > 0);
  if (filtered.length < 2) { alert('퀴즈를 풀려면 최소 2개 단어가 필요해요.'); return; }
  const cnt = parseInt(document.getElementById('q-count').value) || 0;
  const type = document.getElementById('q-type').value;
  
  // Build questions
  const qs = [];
  filtered.forEach(w => {
    if (type === 'syn' || type === 'both') {
      if (w.syn.length) qs.push({w, kind:'syn', answer:w.syn[0|Math.random()*w.syn.length], opts:w.syn, mode:'syn-mcq'});
    }
    if (type === 'ant' || type === 'both') {
      if (w.ant.length) qs.push({w, kind:'ant', answer:w.ant[0|Math.random()*w.ant.length], opts:w.ant, mode:'ant-mcq'});
    }
    if (type === 'eng') {
      if (w.eng) qs.push({w, kind:'eng', answer:w.word, mode:'write'});
    }
    if (type === 'kor') {
      if (w.kor) qs.push({w, kind:'kor', answer:w.word, mode:'write'});
    }
  });
  const shuffled = shuffle(qs);
  qState = {mode, qs: cnt ? shuffled.slice(0,cnt) : shuffled, idx:0, score:0, wrong:[]};
  renderQ();
}

function renderQ() {
  const q = qState.qs[qState.idx];
  const areaId = qState.mode === 'mcq' ? 'quiz-mcq-area' : (qState.mode === 'exam' ? 'exam-area' : 'quiz-write-area');
  
  if (!q) {
    // End of questions
    const pct = qState.qs.length ? Math.round(qState.score / qState.qs.length * 100) : 0;
    document.getElementById(areaId).innerHTML = `
      <div class="card result">
        <div class="result-pct">${pct}%</div>
        <div class="result-sub">${qState.score} / ${qState.qs.length} 정답</div>
        <div class="result-msg">${pct===100?'🎉 완벽!':pct>=80?'👍 잘했어요!':pct>=60?'🙂 조금만 더!':'💪 다시 도전!'}</div>
        ${qState.wrong.length ? `<div style="text-align:left;margin-top:20px"><strong style="color:var(--err)">❌ 틀린 단어 복습 (${qState.wrong.length}개)</strong></div>
          ${qState.wrong.map(w=>`<div class="ritem"><div class="ritem-w">${esc(w.word.word)}</div><div class="ritem-c">정답: ${esc(w.answer)}</div></div>`).join('')}
        </div>` : ''}
        <div class="btn-row" style="justify-content:center;margin-top:18px">
          <button class="btn btn-p" onclick="${qState.mode === 'exam' ? 'renderExam()' : `renderQuizSetup('${qState.mode}')`}">다시 풀기</button>
          <button class="btn btn-o" onclick="setView('home')">홈으로</button>
        </div>
      </div>
    `;
    return;
  }
  
  const typeLbl = {syn:'유의어 (SYN)', ant:'반의어 (ANT)', eng:'영영풀이 → 단어', kor:'한글 뜻 → 단어'}[q.kind];
  const typeCls = {syn:'syn', ant:'ant', eng:'eng', kor:'kor'}[q.kind];
  const isWrite = q.mode === 'write';
  
  let prompt = '';
  if (q.kind === 'syn') prompt = `"${esc(q.w.word)}"의 <strong>유의어</strong>를 고르세요`;
  else if (q.kind === 'ant') prompt = `"${esc(q.w.word)}"의 <strong>반의어</strong>를 고르세요`;
  else if (q.kind === 'eng') prompt = `다음 영영풀이에 해당하는 단어는?<br><em style="color:var(--p)">"${esc(q.w.eng)}"</em>`;
  else if (q.kind === 'kor') prompt = `"${esc(q.w.kor)}" → 이 뜻의 영어 단어는?`;
  
  let choicesHtml = '';
  if (!isWrite) {
    // MCQ: pick wrong answers from other words
    const pool = [...new Set(WORDS.flatMap(x => [...x.syn, ...x.ant]))].filter(x => x && !q.opts.includes(x));
    const wrongs = shuffle(pool).slice(0, 3);
    const choices = shuffle([q.answer, ...wrongs]);
    choicesHtml = `<div class="choices">${choices.map((c,i)=>`<button class="choice" data-val="${esc(c)}" onclick="pickChoice(this, '${esc(q.answer).replace(/'/g,"\\'")}')"><strong>${'①②③④'[i]}</strong> ${esc(c)}</button>`).join('')}</div>`;
  } else {
    choicesHtml = `
      <input type="text" id="write-inp" class="qwrite-input" placeholder="영어 단어를 입력하세요" autocomplete="off">
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-p" onclick="submitWrite('${esc(q.w.word).replace(/'/g,"\\'")}')">제출</button>
      </div>
    `;
  }
  
  document.getElementById(areaId).innerHTML = `
    <div class="qpbar"><div class="qpbar-fill" style="width:${(qState.idx/qState.qs.length*100).toFixed(0)}%"></div></div>
    <div class="card">
      <div class="qtype ${typeCls}">${typeLbl}</div>
      <div class="qword">${esc(q.w.word)}</div>
      <div class="qprompt">${prompt} <span style="color:var(--muted);font-size:12px">(${qState.idx+1}/${qState.qs.length})</span></div>
      ${choicesHtml}
    </div>
    <div class="btn-row">
      <button class="btn btn-o btn-sm" onclick="quitQuiz()">그만하기</button>
    </div>
  `;
  
  if (isWrite) {
    setTimeout(() => {
      const inp = document.getElementById('write-inp');
      if (inp) {
        inp.focus();
        inp.onkeydown = e => { if (e.key === 'Enter') submitWrite(q.w.word); };
      }
    }, 50);
  }
}

function pickChoice(btn, ans) {
  document.querySelectorAll('.choice').forEach(b => b.disabled = true);
  const sel = btn.dataset.val;
  if (sel === ans) {
    btn.classList.add('correct');
    qState.score++;
  } else {
    btn.classList.add('wrong');
    qState.wrong.push({word:qState.qs[qState.idx].w, answer:ans, picked:sel});
    wrongWords[qState.qs[qState.idx].w.id] = Date.now();
    document.querySelectorAll('.choice').forEach(b => { if (b.dataset.val === ans) b.classList.add('correct'); });
  }
  localStorage.setItem('wrong_words', JSON.stringify(wrongWords));
  updateWrongBadge();
  setTimeout(() => { qState.idx++; renderQ(); }, 700);
}

function submitWrite(correct) {
  const inp = document.getElementById('write-inp');
  if (!inp) return;
  const v = inp.value.trim().toLowerCase();
  inp.disabled = true;
  const correct2 = correct.toLowerCase();
  if (v === correct2) {
    inp.classList.add('correct');
    qState.score++;
  } else {
    inp.classList.add('wrong');
    qState.wrong.push({word:qState.qs[qState.idx].w, answer:correct, picked:v});
    wrongWords[qState.qs[qState.idx].w.id] = Date.now();
    inp.value = `${v} → 정답: ${correct}`;
  }
  localStorage.setItem('wrong_words', JSON.stringify(wrongWords));
  updateWrongBadge();
  setTimeout(() => { qState.idx++; renderQ(); }, 1200);
}

function quitQuiz() { 
  if (confirm('퀴즈를 그만할까요?')) {
    qState = null;
    const areaId = currentView === 'quiz-mcq' ? 'quiz-mcq-area' : (currentView === 'exam' ? 'exam-area' : 'quiz-write-area');
    document.getElementById(areaId).innerHTML = '';
    setView(currentView);
  }
}

}

      <div class="fg"><label class="fl">영어 단어 *</label><input id="t-w" class="fi" placeholder="appreciate"></div>
      <div class="fg"><label class="fl">한국어 뜻</label><input id="t-kor" class="fi" placeholder="고마워하다"></div>
      <div class="fg"><label class="fl">영영풀이</label><input id="t-eng" class="fi" placeholder="to be grateful for..."></div>
      <div class="fg"><label class="fl">영영풀이 한글 설명</label><input id="t-kctx" class="fi" placeholder="(선택)..."></div>
      <div class="fg"><label class="fl">유의어 (쉼표 구분)</label><input id="t-syn" class="fi" placeholder="thank, be grateful for"></div>
      <div class="fg"><label class="fl">반의어 (쉼표 구분)</label><input id="t-ant" class="fi" placeholder="resent, disregard"></div>
      <div class="btn-row">
        <button class="btn btn-p" onclick="addTeacherWord()">단어 추가</button>
        <button class="btn btn-o" onclick="exportWords()">⬇ 데이터 내보내기 (JSON)</button>
      </div>
    </div>
    
    <div class="card">
      <h3 style="margin:0 0 8px;font-size:14px">📋 CSV/JSON 일괄 가져오기</h3>
      <div class="tip">CSV 형식: <code>word,synonyms,antonyms,kor,eng,kor_ctx,grade,year,month,exam,questionNo</code><br>
      JSON: 배열 형식 (예시 보기 클릭)</div>
      <input type="file" id="import-file" accept=".csv,.json" class="fi" style="margin-bottom:8px">
      <div class="btn-row">
        <button class="btn btn-p" onclick="handleImport()">불러오기</button>
        <button class="btn btn-o" onclick="downloadSample()">CSV 예시 보기</button>
      </div>
    </div>
    
    <div class="card">
      <h3 style="margin:0 0 8px;font-size:14px">📊 오답 통계 (이 브라우저)</h3>
      <div id="teacher-stats"></div>
    </div>
    
    <div class="card">
      <h3 style="margin:0 0 8px;font-size:14px;font-size:13px;color:var(--err)">⚠️ 데이터 초기화</h3>
      <button class="btn btn-danger" onclick="if(confirm('전체 단어를 초기 데이터로 리셋할까요?')){localStorage.removeItem('extra_words');location.reload()}">추가한 단어 모두 삭제</button>
    </div>
  `;
  updateTeacherStats();
}

function updateTeacherStats() {
  const el = document.getElementById('teacher-stats');
  if (!el) return;
  const total = Object.keys(wrongWords).length;
  if (total === 0) { el.innerHTML = '<div style="color:var(--muted);font-size:13px">아직 오답이 없어요.</div>'; return; }
  
  // Group by question
  const byQ = {};
  Object.keys(wrongWords).forEach(id => {
    const w = WORDS.find(x => x.id === id);
    if (w) byQ[w.questionNo] = (byQ[w.questionNo] || 0) + 1;
  });
  const sorted = Object.entries(byQ).sort((a,b)=>b[1]-a[1]);
  el.innerHTML = `
    <div style="background:var(--bg);padding:10px;border-radius:8px;margin-bottom:10px">
      <strong style="color:var(--err)">총 ${total}개 오답</strong>
    </div>
    <table style="width:100%;font-size:13px;border-collapse:collapse">
      <tr style="background:#f1f5f9"><th style="padding:6px;text-align:left">문제 번호</th><th style="padding:6px;text-align:right">틀린 단어 수</th></tr>
      ${sorted.map(([q,c])=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px"><strong>Q${q}</strong></td><td style="padding:6px;text-align:right;color:var(--err)">${c}개</td></tr>`).join('')}
    </table>
  `;
}

function addTeacherWord() {
  const w = document.getElementById('t-w').value.trim();
  if (!w) { alert('영어 단어를 입력하세요.'); return; }
  const newWord = {
    id: 'tw_' + Date.now(),
    word: w,
    syn: document.getElementById('t-syn').value.split(',').map(s=>s.trim()).filter(Boolean),
    ant: document.getElementById('t-ant').value.split(',').map(s=>s.trim()).filter(Boolean),
    kor: document.getElementById('t-kor').value.trim(),
    eng: document.getElementById('t-eng').value.trim(),
    kor_ctx: document.getElementById('t-kctx').value.trim(),
    grade: document.getElementById('t-grade').value,
    year: parseInt(document.getElementById('t-year').value) || 2026,
    month: parseInt(document.getElementById('t-month').value) || 3,
    exam: document.getElementById('t-exam').value.trim() || '학력평가',
    publisher: document.getElementById('t-pub').value.trim() || '',
    questionNo: parseInt(document.getElementById('t-q').value) || 0
  };
  // Save to localStorage as extra word (won't sync cross-device)
  const extra = JSON.parse(localStorage.getItem('extra_words') || '[]');
  extra.push(newWord);
  localStorage.setItem('extra_words', JSON.stringify(extra));
  WORDS.push(newWord);
  alert(`✅ "${w}" 추가됨 (이 브라우저에만 저장)`);
  ['t-w','t-kor','t-eng','t-kctx','t-syn','t-ant','t-pub'].forEach(id => document.getElementById(id).value = '');
}

function exportWords() {
  const blob = new Blob([JSON.stringify(WORDS, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'words_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

journey,"voyage, trip",stay,여정,"a long trip","긴 여행",고2,2026,3,학력평가,,18

acquire,"obtain, gain, get",lose,습득하다,"to get something","무언가를 얻다",고2,0,0,교과서,YBM(박),2`;

function handleImport() {
  const f = document.getElementById('import-file').files[0];
  if (!f) { alert('파일을 선택하세요.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let added = 0;
      if (f.name.endsWith('.json')) {
        const data = JSON.parse(e.target.result);
        if (Array.isArray(data)) {
          data.forEach(w => {
            if (w.word && !WORDS.find(x => x.word.toLowerCase() === w.word.toLowerCase())) {
              w.id = 'imp_' + (++added);
              WORDS.push(w);
            }
          });
        }
      } else {
        // CSV parse (헤더 기반 동적 파싱 — 컬럼 순서 자유)
        const lines = e.target.result.split('\n').filter(l => l.trim());
        const header = parseCSVLine(lines[0]).map(s => s.toLowerCase().trim());
        const col = {};
        header.forEach((h, i) => col[h] = i);
        for (let i = 1; i < lines.length; i++) {
          const r = parseCSVLine(lines[i]);
          if (!r[col['word']]) continue;
          const isTextbook = (r[col['exam']] || '') === '교과서';
          const w = {
            id: 'imp_' + (++added),
            word: r[col['word']] || '',
            syn: r[col['synonyms']] ? r[col['synonyms']].split(',').map(s=>s.trim()).filter(Boolean) : [],
            ant: r[col['antonyms']] ? r[col['antonyms']].split(',').map(s=>s.trim()).filter(Boolean) : [],
            kor: r[col['kor']] || '',
            eng: r[col['eng']] || '',
            kor_ctx: r[col['kor_ctx']] || '',
            grade: r[col['grade']] || '고2',
            year: isTextbook ? 0 : (parseInt(r[col['year']]) || 2026),
            month: isTextbook ? 0 : (parseInt(r[col['month']]) || 3),
            exam: r[col['exam']] || '학력평가',
            publisher: r[col['publisher']] || '',
            questionNo: parseInt(r[col['questionno'] || col['questionno']]) || 0
          };
          if (!WORDS.find(x => x.word.toLowerCase() === w.word.toLowerCase())) {
            WORDS.push(w);
            added++;
          }
        }
      }
      alert(`✅ ${added}개 단어 추가됨 (이 브라우저에만 저장)`);
      renderTeacher();
    } catch (err) { alert('파일을 읽을 수 없어요: ' + err.message); }
  };
  reader.readAsText(f);
}

function parseCSVLine(line) {
  const r = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { r.push(cur); cur=''; }
      else cur += c;
    }
  }
  r.push(cur);
  return r;
}

/* ═══════════════ WRONG BADGE ═══════════════ */
function updateWrongBadge() {
  const cnt = Object.keys(wrongWords).length;
  const badge = document.getElementById('wrong-badge');
  if (cnt > 0) {
    badge.textContent = cnt;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

/* ═══════════════ INIT ═══════════════ */
function init() {
  // Load extra words from this browser
  try {
    const extra = JSON.parse(localStorage.getItem('extra_words') || '[]');
    WORDS.push(...extra);
  } catch {}
  
  // Hide teacher button if not teacher mode
  if (!teacherMode) {
    document.getElementById('teacher-btn').hidden = true;
  }
  
  // Nav buttons
  document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
    btn.onclick = () => setView(btn.dataset.view);
  });
  
  updateWrongBadge();
  renderHome();
  
  // Keyboard shortcuts for flashcard
  document.addEventListener('keydown', e => {
    if (currentView === 'flashcard' && fcList.length) {
      if (e.key === 'ArrowLeft') fcPrev();
      if (e.key === 'ArrowRight') fcNext();
      if (e.key === ' ' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('fc-card')?.classList.toggle('flipped');
      }
    }
  });
}

init();
</script>
