"ant":["significant","important","major"],"kor":"사소한","eng":"of little value or importance","kor_ctx":"가치나 중요성이 적은"},{"word":"depth","syn":["profoundness","deepness","intensity","complexity"],"ant":["shallowness","superficiality"],"kor":"깊이","eng":"the distance from the top or surface to the bottom of something","kor_ctx":"위나 표면에서 아래까지의 거리"}]},{"no":40,"words":[{"word":"self-experimentation","syn":["self-testing","personal experimentation","n=1 experiment"],"ant":[],"kor":"자기 실험","eng":"the practice of conducting experiments on oneself","kor_ctx":"자신에게 실험을 수행하는 행위"},{"word":"conventional","syn":["traditional","customary","orthodox","established"],"ant":["unconventional","radical","novel"],"kor":"전통적인, 관습적인","eng":"based on or in accordance with what is generally done or believed","kor_ctx":"일반적으로 행해지거나 믿어지는 것에 기반하거나 따르는"},{"word":"discovery","syn":["finding","revelation","detection","breakthrough"],"ant":["concealment","hiding"],"kor":"발견","eng":"the act of finding something for the first time or something newly found","kor_ctx":"처음으로 무언가를 발견하는 행위 또는 새로 발견된 것"},{"word":"convince","syn":["persuade","sway","assure","win over"],"ant":["dissuade","discourage"],"kor":"설득하다","eng":"to make someone believe that something is true or should be done","kor_ctx":"누군가가 무언가가 사실이거나 해야 한다고 믿게 만드는 것"},{"word":"helpful","syn":["useful","beneficial","valuable","supportive"],"ant":["unhelpful","useless","detrimental"],"kor":"도움이 되는","eng":"giving help; useful or beneficial","kor_ctx":"도움을 주는; 유용하거나 유익한"},{"word":"correct","syn":["accurate","right","proper","rectify"],"ant":["incorrect","wrong","mistaken"],"kor":"올바른, 고치다","eng":"free from errors; to make something right or accurate","kor_ctx":"오류가 없는; 무언가를 옳거나 정확하게 만드는 것"},{"word":"generate","syn":["produce","create","make","yield"],"ant":["consume","destroy","extinguish"],"kor":"발생시키다, 생성하다","eng":"to produce or create something, especially energy or ideas","kor_ctx":"무언가, 특히 에너지나 아이디어를 생산하거나 만드는 것"},{"word":"eliminate","syn":["remove","eradicate","delete","get rid of"],"ant":["add","include","retain"],"kor":"제거하다","eng":"to completely remove or get rid of something","kor_ctx":"무언가를 완전히 제거하거나 없애는 것"},{"word":"hypothesis","syn":["theory","assumption","proposition","conjecture"],"ant":["fact","certainty","proof"],"kor":"가설","eng":"a proposed explanation made on limited evidence as a starting point for further investigation","kor_ctx":"제한된 증거를 바탕으로 추가 조사를 위한 출발점으로 제안된 설명"},{"word":"exploratory","syn":["investigative","probing","preliminary","experimental"],"ant":["conclusive","definitive"],"kor":"탐색적인","eng":"relating to or involving the process of searching or investigating","kor_ctx":"탐색하거나 조사하는 과정과 관련된"},{"word":"optimize","syn":["improve","refine","enhance","perfect"],"ant":["worsen","degrade","impair"],"kor":"최적화하다","eng":"to make something as effective or functional as possible","kor_ctx":"무언가를 가능한 한 효과적이거나 기능적으로 만드는 것"},{"word":"maximize","syn":["increase","amplify","expand","intensify"],"ant":["minimize","reduce","decrease"],"kor":"최대화하다","eng":"to make something as great or as large as possible","kor_ctx":"무언가를 가능한 한 크거나 많게 만드는 것"}]}];

(function() {
  const statusEl = document.getElementById('status');
  const infoEl = document.getElementById('info');
  const btnEl = document.getElementById('goBtn');
  try {
    // 1) 세트 처리
    const SETS = JSON.parse(localStorage.getItem('sa_sets') || '[]');
    let W = JSON.parse(localStorage.getItem('sa_words') || '[]');
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

    let set = SETS.find(s => s.id === EXAM_ID);
    if (!set) {
      set = {
        id: EXAM_ID,
        name: EXAM_NAME,
        type: 'mockexam',
        grade: GRADE,
        year: YEAR,
        month: MONTH,
        examType: EXAM_TYPE
      };
      SETS.push(set);
    } else {
      // 기존 세트 정보 업데이트
      set.name = EXAM_NAME;
      set.grade = GRADE;
      set.year = YEAR;
      set.month = MONTH;
      set.examType = EXAM_TYPE;
      set.type = 'mockexam';
    }

    // 2) 단어 추가
    let added = 0, updated = 0, skipped = 0;
    QUESTIONS.forEach(q => {
      q.words.forEach(w => {
        if (!w.word) return;
        // 같은 시험의 같은 단어 찾기 (setId + examId 일치 + 같은 단어)
        const existing = W.find(x =>
          x.word.toLowerCase() === w.word.toLowerCase() &&
          (x.examId === EXAM_ID || x.setId === EXAM_ID)
        );
        const wordObj = {
          id: existing ? existing.id : uid(),
          word: w.word,
          synonyms: w.syn || [],
          antonyms: w.ant || [],
          kor: w.kor || '',
          kor_ctx: w.kor_ctx || '',
          eng: w.eng || '',
          note: '',
          examId: EXAM_ID,
          questionNo: q.no,
          setId: '' // 모의고사 단어는 setId 비움 (탭에서 분리)
        };
        if (existing) {
          Object.assign(existing, wordObj);
          updated++;
        } else {
          W.push(wordObj);
          added++;
        }
        // 참고: 단어의 setId는 빈 문자열로 두어 모의고사 탭에서 분리.
        // 단, wordsFor/getExamWords/deleteSet은 examId도 함께 체크하도록 앱에서 수정됨.
      });
    });

    // 3) 저장
    localStorage.setItem('sa_sets', JSON.stringify(SETS));
    localStorage.setItem('sa_words', JSON.stringify(W));

    // 4) 통계
    const setWords = W.filter(w => w.examId === EXAM_ID);
    const byQuestion = {};
    setWords.forEach(w => {
      const k = 'Q' + w.questionNo;
      byQuestion[k] = (byQuestion[k] || 0) + 1;
    });
    const qList = Object.keys(byQuestion).sort((a,b) => parseInt(a.slice(1)) - parseInt(b.slice(1))).join(', ');

    statusEl.className = 'status success';
    statusEl.innerHTML = '✅ <strong>' + (added + updated) + '개</strong> 처리 완료'
      + (added ? '<br><small>➕ 신규: ' + added + '개</small>' : '')
      + (updated ? '<br><small>🔄 업데이트: ' + updated + '개</small>' : '');

    infoEl.style.display = 'block';
    infoEl.innerHTML =
      '📁 <strong>저장된 시험:</strong> ' + EXAM_NAME + '<br>' +
      '📊 <strong>이 시험의 단어:</strong> ' + setWords.length + '개<br>' +
      '📚 <strong>전체 단어:</strong> ' + W.length + '개 (' + SETS.length + '개 세트)<br>' +
      '<hr style="border:none;border-top:1px solid #e2e8f0;margin:10px 0">' +
      '🔢 <strong>문항별:</strong> ' + qList + '<br>' +
      '<small style="color:#7c3a6d"><strong>💡 앱에서 Ctrl+Shift+R 강력 새로고침!</strong></small>';

    btnEl.style.display = 'inline-block';
    btnEl.textContent = '📖 앱 열기 (' + W.length + '개 단어)';
  } catch (e) {
    statusEl.className = 'status error';
    statusEl.innerHTML = '❌ 오류 발생: ' + e.message;
    console.error(e);
  }
})();
</script>
